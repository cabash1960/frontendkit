name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 */4 * *" # runs every 4 days at midnight
  workflow_dispatch: # lets you trigger it manually too

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          CLEAN_URL=$(echo "$SUPABASE_URL" | xargs | tr -d ' ')
          CLEAN_KEY=$(echo "$SUPABASE_ANON_KEY" | xargs | tr -d ' ')
          curl -f -X GET \
            "$CLEAN_URL/rest/v1/sections?limit=1" \
            -H "apikey: $CLEAN_KEY" \
            -H "Authorization: Bearer $CLEAN_KEY"




